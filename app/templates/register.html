<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest game list - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth_shared.css">
    <link rel="stylesheet" href="/static/css/register_screen.css">
</head>
<body>
    <div class="page-wrap">
        {% set auth_nav_primary_href = "/" %}
        {% set auth_nav_primary_label = "Entrar" %}
        {% include "partials/auth_top_nav.html" %}

        <main class="register-shell">
            <section class="register-card">
                {% include "partials/auth_brand.html" %}

                <h2>Cadastro</h2>

                <form class="register-form" action="#" method="post">
                    <label for="email">Endereco de e-mail</label>
                    <input id="email" name="email" type="email" autocomplete="email" placeholder="Endereco de e-mail">

                    <label for="username">Nome de usuario</label>
                    <input id="username" name="username" type="text" autocomplete="username" placeholder="Nome de usuario">
                    <small>Maximo de 16 caracteres</small>

                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Senha">
                    <small>Minimo de 6 caracteres</small>

                    <label for="password_confirm">Confirmacao de senha</label>
                    <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" placeholder="Confirmacao de senha">

                    <label class="terms" for="terms">
                        <input id="terms" name="terms" type="checkbox">
                        <span>Aceito os Termos de Servico e a Politica de Privacidade</span>
                    </label>

                    <button type="submit">Cadastrar</button>
                </form>

                <div class="support-links">
                    <a href="/">Ja tem conta? Entrar</a>
                </div>
            </section>
        </main>

        {% include "partials/auth_footer.html" %}
    </div>
</body>
</html>
